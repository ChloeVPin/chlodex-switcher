<!DOCTYPE html>
<html>

    <div class="container">
        <svg class="status-svg success" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
