<!DOCTYPE html>
<html>
<head>
    <title>Login Failed</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #1e1e1e;
            color: #d4d4d4;
        }
        .container {
            text-align: center;
            background-color: #252526;
            border: 1px solid #2d2d2d;
            padding: 40px 50px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 400px;
            width: 100%;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .status-svg {
            width: 48px;
            height: 48px;
            margin-bottom: 20px;
        }
        h1 {
            color: #ffffff;
            font-size: 20px;
            font-weight: 600;
            margin: 0 0 10px 0;
        }
        p {
            color: #a6a6a6;
            font-size: 13px;
            line-height: 1.5;
            margin: 0;
        }
        .detail {
            margin-top: 15px;
            padding: 8px 12px;
            background-color: #1e1e1e;
            border: 1px solid #2d2d2d;
            border-radius: 6px;
            font-family: monospace;
            font-size: 11px;
            color: #ff4d4d;
            word-break: break-all;
            width: 100%;
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <div class="container">
        <svg class="status-svg error" viewBox="0 0 24 24" fill="none" stroke="#ff4d4d" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        <h1>Login Failed</h1>
        <p>OAuth authorization error occurred.</p>
        <div class="detail">OAuth error: invalid_request - The client_id is invalid or missing.</div>
    </div>
</body>
</html>
